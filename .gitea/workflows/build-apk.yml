name: Build GlowAI APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install + sync
        run: npm ci && npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Verify APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          [ -f "$APK" ] && echo "APK built: $(du -sh $APK | cut -f1) ✓" || { echo "APK missing"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: glowai-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "GlowAI ${{ github.ref_name }}"
          body: |
            ## GlowAI ${{ github.ref_name }}
            AI skin analysis — powered by Claude Vision.
            **PWA:** https://cadger808.codeberg.page/glowai
            **APK:** Download below · No app store needed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

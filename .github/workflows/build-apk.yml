name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Security audit (high+ fails build)
        run: npm audit --audit-level=high --omit=dev

      - name: Validate critical files
        run: |
          for f in index.html manifest.json sw.js js/core/api.js js/core/state.js; do
            [ -f "$f" ] && echo "✓ $f" || (echo "✗ MISSING: $f" && exit 1)
          done

      - name: Build www/ from source
        run: |
          mkdir -p www/icons www/js www/css
          cp index.html manifest.json sw.js www/
          [ -f offline.html ] && cp offline.html www/ || true
          cp -r js/*  www/js/
          cp -r css/* www/css/
          cp icons/*.png www/icons/ 2>/dev/null || true

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlowAI-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          gh release create "$TAG" "$APK" \
            --title "GlowAI $TAG" \
            --notes "Download the APK below to install on Android." \
            --repo "$GITHUB_REPOSITORY"

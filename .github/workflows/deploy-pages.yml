name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build www/ from source
        run: |
          mkdir -p www/icons www/js www/css
          cp index.html manifest.json sw.js www/
          [ -f offline.html ] && cp offline.html www/ || true
          cp -r js/*  www/js/
          cp -r css/* www/css/
          cp icons/*.png www/icons/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: GlowAI PWA'

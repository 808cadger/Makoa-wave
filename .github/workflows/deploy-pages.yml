name: Deploy PWA to Codeberg Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Sync web assets to www
        run: npx cap copy android

      - name: Deploy to Codeberg Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: pages
          force_orphan: true
          user_name: 'forgejo-actions[bot]'
          user_email: 'forgejo-actions[bot]@noreply.codeberg.org'
          commit_message: 'Deploy GlowAI PWA to Codeberg Pages'
